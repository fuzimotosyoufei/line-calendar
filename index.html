<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト希望提出</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 10px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            font-size: 18px;
            color: #333;
        }

        /* LINEでの名前が表示される場所のスタイル */
        #user-info {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: #06C755;
        }

        #calendar {
            margin-bottom: 20px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #06C755;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="user-info">読み込み中...</div>
        <h2>📅 シフト希望入力</h2>
        <div id="calendar"></div>

        <button class="btn-submit" onclick="submitData()">この内容で申請する</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script>
        let selectedDates = [];

        document.addEventListener('DOMContentLoaded', function () {

            // LINEの機能を初期化
            // ※ "YOUR_LIFF_ID_HERE" は、次のステップで発行されるIDに後で書き換えます！
            liff.init({ liffId: "YOUR_LIFF_ID_HERE" })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        liff.getProfile().then(profile => {
                            document.getElementById('user-info').innerText = "こんにちは、" + profile.displayName + " さん";
                        });
                    }
                })
                .catch((err) => {
                    console.log('LIFF初期化エラー:', err);
                    document.getElementById('user-info').innerText = "※LINEアプリ以外から開かれています";
                });

            // カレンダー
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                selectable: true,
                dateClick: function (info) {
                    const clickedDate = info.dateStr;
                    if (selectedDates.includes(clickedDate)) {
                        selectedDates = selectedDates.filter(date => date !== clickedDate);
                        info.dayEl.style.backgroundColor = '';
                    } else {
                        selectedDates.push(clickedDate);
                        info.dayEl.style.backgroundColor = '#ffcccc';
                    }
                }
            });
            calendar.render();
        });

        // 申請ボタン
        function submitData() {
            if (selectedDates.length === 0) {
                alert("日付が選択されていません！");
                return;
            }

            // LINEの中で開かれている場合、トークにメッセージを自動送信
            if (liff.isInClient()) {
                liff.sendMessages([{
                    type: 'text',
                    text: "【シフト希望】\n" + selectedDates.join("\n") + "\n上記で申請します。"
                }]).then(() => {
                    alert("申請を送りました！");
                    liff.closeWindow(); // 画面を閉じる
                }).catch((err) => {
                    alert("送信に失敗しました: " + err);
                });
            } else {
                alert("（ブラウザテスト用）以下の日付で申請します：\n" + selectedDates.join("\n"));
            }
        }
    </script>
</body>

</html>
